name: Gamer520 Daily Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      send_feishu:
        description: '是否推送飞书通知'
        required: false
        default: 'true'
        type: boolean

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4

      - name: Install Puppeteer
        run: |
          cd /tmp
          npm init -y
          npm install puppeteer

      - name: Check if Feishu push needed
        id: check_time
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "11" ] || [ "$HOUR" = "12" ] || [ "$HOUR" = "13" ]; then
            echo "SEND_FEISHU=true" >> $GITHUB_OUTPUT
          else
            echo "SEND_FEISHU=false" >> $GITHUB_OUTPUT
          fi

      - name: Run update script
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPO: ilan3437/gamer520-daily
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          SEND_FEISHU: ${{ inputs.send_feishu || steps.check_time.outputs.SEND_FEISHU }}
        run: python update.py
