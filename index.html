@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
:root {
    --bg: #0a0a0f;
    --card: #14141f;
    --card-hover: #1a1a2e;
    --border: #2a2a3e;
    --accent: #00e68a;
    --accent-hover: #00ff99;
    --text: #e8e8f0;
    --text-dim: #8888a0;
    --danger: #ff6b6b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px 16px;
    max-width: 600px;
    margin: 0 auto;
    min-height: 100vh;
}
.header {
    text-align: center;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
}
.header h1 {
    font-size: 22px;
    font-weight: 900;
    background: linear-gradient(135deg, #00e68a, #00b8ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.header .date {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
}
.header .count {
    font-size: 12px;
    color: var(--accent);
    background: rgba(0,230,138,0.1);
    padding: 4px 12px;
    border-radius: 20px;
    display: inline-block;
    margin-top: 8px;
}
.refresh-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, var(--accent), #00b8ff);
    color: #000;
    border: none;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
    transition: all 0.2s ease;
}
.refresh-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 15px rgba(0,230,138,0.3);
}
.refresh-btn:active {
    transform: scale(0.98);
}
.refresh-btn.loading {
    opacity: 0.7;
    pointer-events: none;
}
.refresh-btn .spinner {
    display: none;
    width: 14px;
    height: 14px;
    border: 2px solid #000;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
.refresh-btn.loading .spinner {
    display: inline-block;
}
.refresh-btn.loading .btn-text {
    display: none;
}
@keyframes spin {
    to { transform: rotate(360deg); }
}
.game-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 8px;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s ease;
    animation: fadeIn 0.4s ease backwards;
}
.game-card:active {
    transform: scale(0.98);
    background: var(--card-hover);
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
.game-cover-wrapper {
    width: 80px;
    height: 45px;
    border-radius: 6px;
    flex-shrink: 0;
    background: linear-gradient(135deg, #1e1e30, #2a2a3e);
    position: relative;
    overflow: hidden;
}
.game-cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
    cursor: zoom-in;
    transition: transform 0.2s ease;
}
.game-cover:hover {
    transform: scale(1.05);
}
.game-cover.error {
    display: none;
}
.game-cover-placeholder {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
}
.game-cover-wrapper:not(:has(.game-cover[src])) .game-cover-placeholder,
.game-cover-wrapper:has(.game-cover.error) .game-cover-placeholder {
    display: flex;
}
.game-cover-wrapper:has(.game-cover[src]:not(.error)) .game-cover-placeholder {
    display: none;
}
.game-info {
    flex: 1;
    min-width: 0;
}
.game-name {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
}
.game-meta {
    display: flex;
    align-items: center;
    gap: 6px;
}
.game-tag {
    font-size: 11px;
    color: var(--accent);
    background: rgba(0,230,138,0.1);
    border: 1px solid rgba(0,230,138,0.25);
    padding: 1px 6px;
    border-radius: 4px;
    font-weight: 500;
}
.game-time {
    font-size: 11px;
    color: var(--text-dim);
}
.footer {
    text-align: center;
    padding: 16px;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
}
.footer a {
    color: var(--accent);
    text-decoration: none;
}
.lightbox {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
}
.lightbox.active {
    display: flex;
}
.lightbox img {
    max-width: 100%;
    max-height: 80vh;
    border-radius: 8px;
    object-fit: contain;
}
.lightbox-close {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.1);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
.lightbox-title {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 14px;
    text-align: center;
    max-width: 90%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 1001;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
}
.toast.show {
    opacity: 1;
}
.loading-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(10,10,15,0.9);
    z-index: 999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 16px;
}
.loading-overlay.active {
    display: flex;
}
.loading-spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
}
.loading-text {
    color: var(--text);
    font-size: 14px;
}
</style>

const DATE_STR = '2026-05-18';

// 渲染游戏列表
function renderGames(games = GAMES_DATA) {
    const listEl = document.getElementById('gameList');
    const countEl = document.getElementById('count');
    
    if (!games || games.length === 0) {
        listEl.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim)">今天暂无新游戏</div>';
        countEl.textContent = '共 0 款';
        return;
    }
    
    countEl.textContent = `共 ${games.length} 款`;

    listEl.innerHTML = games.map((game, i) => `
        <a class="game-card" href="${game.link}" target="_blank" style="animation-delay:${i*0.03}s">
            <div class="game-cover-wrapper">
                <img class="game-cover" src="${game.cover || ''}" alt="${game.name}" loading="lazy"
                     onerror="this.classList.add('error'); this.style.display='none';"
                     onload="this.style.display='block';"
                     onclick="event.preventDefault();openLightbox('${game.cover}', '${game.name}')">
                <div class="game-cover-placeholder">🎮</div>
            </div>
            <div class="game-info">
                <div class="game-name">${i+1}. ${game.name}</div>
                <div class="game-meta">
                    <span class="game-tag">${game.type}</span>
                    <span class="game-time">${game.time}</span>
                </div>
            </div>
        </a>
    `).join('');
}

// 打开大图
function openLightbox(src, title) {
    if (!src) return;
    const lightbox = document.getElementById('lightbox');
    const img = document.getElementById('lightboxImg');
    const titleEl = document.getElementById('lightboxTitle');
    img.src = src;
    titleEl.textContent = title;
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
}

// 关闭大图
function closeLightbox() {
    const lightbox = document.getElementById('lightbox');
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
}

// 显示提示
function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

// 显示/隐藏加载中
function showLoading(show) {
    const overlay = document.getElementById('loadingOverlay');
    if (show) {
        overlay.classList.add('active');
    } else {
        overlay.classList.remove('active');
    }
}

// 刷新数据 - 从GitHub获取最新数据
async function handleRefresh() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('loading');
    showLoading(true);
    
    try {
        // 添加时间戳防止缓存
        const timestamp = new Date().getTime();
        const response = await fetch(`https://raw.githubusercontent.com/dandelion0422/gamer520-daily/main/index.html?t=${timestamp}`);
        
        if (!response.ok) {
            throw new Error('获取数据失败');
        }
        
        const htmlText = await response.text();
        
        // 从HTML中提取游戏数据
        const dataMatch = htmlText.match(/const GAMES_DATA = (\[.*?\]);/s);
        if (dataMatch) {
            const newData = JSON.parse(dataMatch[1]);
            GAMES_DATA = newData;
            renderGames(newData);
            
            // 更新更新时间
            const timeMatch = htmlText.match(/更新时间: ([\d:]+)/);
            if (timeMatch) {
                document.getElementById('updateTime').textContent = `更新时间: ${timeMatch[1]}`;
            }
            
            showToast(`✅ 已刷新，共 ${newData.length} 款游戏`);
        } else {
            showToast('⚠️ 未找到数据，请稍后重试');
        }
    } catch (error) {
        console.error('刷新失败:', error);
        showToast('❌ 刷新失败，请检查网络');
    } finally {
        btn.classList.remove('loading');
        showLoading(false);
    }
}

// 键盘支持
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
});

// 初始化
renderGames();
</script>
